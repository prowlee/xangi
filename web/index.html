<body>
  <div id="overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <div class="top">
      <button class="new-btn" onclick="newSession()">+ 新建聊天</button>
      <input type="text" placeholder="搜索..." oninput="filterSessions(this.value)">
    </div>
    <div id="session-list"></div>
  </div>
  <div id="main">
    <header>
      <button id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
      <h1>xangi</h1>
      <span class="session-title" id="session-title" onclick="editTitle()" title="点击编辑标题"></span>
    </header>
    <div id="messages"></div>
    <div id="attach-preview"></div>
    <div id="input-area">
      <button id="attach-btn" onclick="document.getElementById('file-input').click()" title="附加文件">&#128206;</button>
      <input type="file" id="file-input" multiple accept="image/*,.pdf,.mp3,.mp4,.wav" onchange="handleFileSelect(event)">
      <textarea id="input" rows="1" placeholder="消息..." onkeydown="handleKey(event)"></textarea>
      <button id="send" class="action-btn" onclick="send()">发送</button>
      <button id="stop" class="action-btn" onclick="stopChat()">停止</button>
    </div>
  </div>
  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const stopBtn = document.getElementById('stop');
    const sessionListEl = document.getElementById('session-list');
    const sessionTitleEl = document.getElementById('session-title');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    let sending = false;
    let currentSessionId = null;
    let allSessions = [];
    let abortController = null;
    let pendingFiles = []; // { name, path, localUrl }

    // ─── 文件附件 ───
    const attachPreview = document.getElementById('attach-preview');

    function handleFileSelect(e) {
      for (var f of e.target.files) {
        addPendingFile(f);
      }
      e.target.value = '';
    }

    async function addPendingFile(file) {
      var formData = new FormData();
      formData.append('file', file);
      try {
        var res = await fetch('/api/upload', { method: 'POST', body: formData });
        var data = await res.json();
        if (data.files && data.files.length > 0) {
          var f = data.files[0];
          var localUrl = file.type.startsWith('image/') ? URL.createObjectURL(file) : null;
          pendingFiles.push({ name: f.name, path: f.path, localUrl: localUrl });
          renderAttachPreview();
        }
      } catch(err) {
        console.error('上传失败:', err);
      }
    }

    function removePendingFile(idx) {
      if (pendingFiles[idx] && pendingFiles[idx].localUrl) {
        URL.revokeObjectURL(pendingFiles[idx].localUrl);
      }
      pendingFiles.splice(idx, 1);
      renderAttachPreview();
    }

    function renderAttachPreview() {
      if (pendingFiles.length === 0) {
        attachPreview.style.display = 'none';
        attachPreview.innerHTML = '';
        return;
      }
      attachPreview.style.display = 'block';
      attachPreview.innerHTML = pendingFiles.map(function(f, i) {
        var img = f.localUrl ? '<img src="' + f.localUrl + '">' : '';
        return '<span class="preview-item">' + img + f.name + ' <span class="remove-btn" onclick="removePendingFile(' + i + ')">×</span></span>';
      }).join('');
    }

    // ─── 侧边栏 ───
    function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

    // ─── 去除元数据 ───
    function stripMetadata(text) {
      if (typeof text !== 'string') return String(text);
      return text
        .replace(/^\[平台: [^\]]*\]\n?/m, '')
        .replace(/^\[频道: [^\]]*\]\n?/m, '')
        .replace(/^\[发言者: [^\]]*\]\n?/m, '')
        .replace(/^\[当前时间: [^\]]*\]\n?/m, '')
        .replace(/^\[频道ID: [^\]]*\]\n?/m, '')
        .trim();
    }

    /** 将 MEDIA:路径 转换为图片/音频/视频标签 */
    function convertMediaPaths(text) {
      var imgExts = ['.png','.jpg','.jpeg','.gif','.webp'];
      var audioExts = ['.mp3','.wav','.flac'];
      var videoExts = ['.mp4'];
      return text.replace(/MEDIA:([^\s\n]+)/g, function(match, path) {
        var ext = path.slice(path.lastIndexOf('.')).toLowerCase();
        var url = '/api/workspace-file?path=' + encodeURIComponent(path);
        if (imgExts.indexOf(ext) >= 0) return '<img src="' + url + '" style="max-width:300px;border-radius:6px;margin:4px 0;cursor:pointer;" onclick="window.open(this.src)">';
        if (audioExts.indexOf(ext) >= 0) return '<audio controls src="' + url + '"></audio>';
        if (videoExts.indexOf(ext) >= 0) return '<video controls src="' + url + '" style="max-width:100%;border-radius:6px;"></video>';
        return '<a href="' + url + '" target="_blank">' + path.split('/').pop() + '</a>';
      });
    }

    /** Markdown 渲染（优先使用 marked.js，带回退方案） */
    function renderMarkdown(text) {
      // 先转换 MEDIA: 路径
      text = convertMediaPaths(text);
      if (typeof marked !== 'undefined' && marked.parse) {
        try { return marked.parse(text); } catch(e) {}
      }
      // 回退方案：最小化的 Markdown 转换
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/(^|\n)(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank">$2</a>')
        .replace(/\n/g, '<br>');
    }

    function formatTime(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      const h = d.getHours().toString().padStart(2,'0');
      const m = d.getMinutes().toString().padStart(2,'0');
      return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + h + ':' + m;
    }

    // ─── 显示消息 ───
    function addMessage(text, role, opts) {
      opts = opts || {};
      const wrapper = document.createElement('div');
      wrapper.className = 'msg-wrapper ' + role;

      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const cleaned = stripMetadata(text);
      if (role === 'assistant') {
        div.innerHTML = renderMarkdown(cleaned);
        div.style.whiteSpace = 'normal';
      } else {
        div.textContent = cleaned;
      }
      wrapper.appendChild(div);

      if (opts.createdAt) {
        const t = document.createElement('div');
        t.className = 'msg-time';
        t.textContent = formatTime(opts.createdAt);
        wrapper.appendChild(t);
      }

      if (role === 'assistant' && opts.usage) {
        var u = opts.usage;
        var parts = [];
        if (u.num_turns != null) parts.push('\u{1F504} ' + u.num_turns + ' 轮');
        if (u.duration_ms != null) parts.push('\u{23F1}\uFE0F ' + (u.duration_ms/1000).toFixed(1) + '秒');
        if (u.total_cost_usd != null) parts.push('\u{1F4B0} $' + u.total_cost_usd.toFixed(4));
        if (parts.length > 0) {
          var uel = document.createElement('div');
          uel.className = 'msg-usage';
          uel.innerHTML = parts.map(function(p){ return '<span>'+p+'</span>'; }).join('');
          wrapper.appendChild(uel);
        }
      }

      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // ─── 会话 ───
    async function loadSessions() {
      try {
        var res = await fetch('/api/sessions');
        var data = await res.json();
        allSessions = data.sessions || [];
        renderSessions(allSessions);
      } catch(e) {}
    }

    function renderSessions(sessions) {
      sessionListEl.innerHTML = '';
      var lastDate = '';
      for (var i = 0; i < sessions.length; i++) {
        var s = sessions[i];
        var date = (s.updatedAt || s.createdAt || '').slice(0, 10);
        if (date !== lastDate) {
          lastDate = date;
          var g = document.createElement('div');
          g.className = 'date-group';
          g.textContent = getDateLabel(date);
          sessionListEl.appendChild(g);
        }
        var item = document.createElement('div');
        item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
        var icon = s.platform === 'web' ? '\u{1F310}' : s.platform === 'slack' ? '\u{1F4AC}' : '\u{1F48E}';
        var active = s.isActive ? '\u{1F7E2} ' : '';
        item.setAttribute('data-id', s.id);
        item.style.cssText = 'display:flex;align-items:center;justify-content:space-between;';
        var label = document.createElement('span');
        label.textContent = active + icon + ' ' + (s.title || s.id);
        label.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;';
        label.onclick = function(){ var id = this.parentElement.getAttribute('data-id'); loadSession(id); closeSidebar(); };
        item.appendChild(label);
        var delBtn = document.createElement('span');
        delBtn.textContent = '\u{00D7}';
        delBtn.style.cssText = 'color:#666;cursor:pointer;padding:0 4px;font-size:16px;flex-shrink:0;';
        delBtn.onmouseover = function(){ this.style.color='#e74c3c'; };
        delBtn.onmouseout = function(){ this.style.color='#666'; };
        delBtn.setAttribute('data-id', s.id);
        delBtn.onclick = function(e){ e.stopPropagation(); deleteSessionById(this.getAttribute('data-id')); };
        item.appendChild(delBtn);
        sessionListEl.appendChild(item);
      }
    }

    function getDateLabel(d) {
      var today = new Date().toISOString().slice(0,10);
      var y = new Date(Date.now()-86400000).toISOString().slice(0,10);
      if (d === today) return '今天';
      if (d === y) return '昨天';
      return d;
    }

    function filterSessions(q) {
      if (!q) { renderSessions(allSessions); return; }
      q = q.toLowerCase();
      renderSessions(allSessions.filter(function(s){ return (s.title||s.id).toLowerCase().indexOf(q) >= 0; }));
    }

    async function loadSession(id) {
      currentSessionId = id;
      messagesEl.innerHTML = '';
      renderSessions(allSessions);
      try {
        var res = await fetch('/api/sessions/' + encodeURIComponent(id));
        var data = await res.json();
        sessionTitleEl.textContent = data.title || id;
        var msgs = data.messages || [];
        for (var i = 0; i < msgs.length; i++) {
          var m = msgs[i];
          if (m.role === 'error') continue;
          var content = typeof m.content === 'string' ? m.content : JSON.stringify(m.content);
          addMessage(content, m.role, { createdAt: m.createdAt, usage: m.usage });
        }
        var isActiveWeb = allSessions.some(function(s){ return s.id === id && s.isActive && s.contextKey === 'web-chat'; });
        if (isActiveWeb) {
          inputEl.disabled = false;
          sendBtn.disabled = false;
          inputEl.placeholder = '消息...';
        } else {
          inputEl.disabled = true;
          sendBtn.disabled = true;
          inputEl.placeholder = '只读';
          // 仅限 Web 来源的会话显示恢复按钮（Discord 会话不显示）
          var sessionInfo = allSessions.find(function(s){ return s.id === id; });
          var isWebSession = !sessionInfo || sessionInfo.platform === 'web';
          if (isWebSession) {
            var resumeBtn = document.createElement('button');
            resumeBtn.textContent = '\u{1F4AC} 恢复此会话';
            resumeBtn.style.cssText = 'background:#0f3460;color:#53c0f0;border:1px solid #53c0f0;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;margin:8px auto;display:block;';
            resumeBtn.onclick = function(){ resumeSession(id); };
            messagesEl.appendChild(resumeBtn);
          }
        }
      } catch(e) {}
    }

    // ─── 发送 ───
    function setProcessing(on) {
      sending = on;
      sendBtn.style.display = on ? 'none' : '';
      stopBtn.style.display = on ? '' : 'none';
      inputEl.disabled = on;
    }

    async function send() {
      var msg = inputEl.value.trim();
      if (!msg || sending) return;

      // 如果有附件，添加到提示词中
      var fullMsg = msg;
      if (pendingFiles.length > 0) {
        var attachments = pendingFiles.map(function(f){ return '[附件] ' + f.path; }).join('\n');
        fullMsg = msg + '\n\n' + attachments;
      }

      addMessage(msg, 'user', { createdAt: new Date().toISOString() });
      // 同时将附件图片预览添加到消息中
      if (pendingFiles.length > 0) {
        var lastWrapper = messagesEl.lastElementChild;
        if (lastWrapper) {
          var imgContainer = document.createElement('div');
          imgContainer.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap;padding:4px 0;';
          pendingFiles.forEach(function(f) {
            if (f.localUrl) {
              var img = document.createElement('img');
              img.src = f.localUrl;
              img.style.cssText = 'max-height:80px;border-radius:4px;';
              imgContainer.appendChild(img);
            }
          });
          if (imgContainer.children.length > 0) {
            lastWrapper.querySelector('.msg').appendChild(imgContainer);
          }
        }
      }
      pendingFiles = [];
      renderAttachPreview();

      inputEl.value = '';
      inputEl.style.height = 'auto';
      setProcessing(true);

      // 工具使用显示区域 + 流式文本显示区域
      var toolsWrapper = document.createElement('div');
      toolsWrapper.className = 'msg-wrapper assistant';
      var toolsDiv = document.createElement('div');
      toolsDiv.className = 'msg thinking';
      toolsDiv.textContent = '思考中...';
      toolsWrapper.appendChild(toolsDiv);
      messagesEl.appendChild(toolsWrapper);

      var assistantWrapper = null;
      var assistantDiv = null;
      var toolHistory = [];

      abortController = new AbortController();
      try {
        var res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: fullMsg }),
          signal: abortController.signal,
        });

        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buf = '';

        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buf += decoder.decode(chunk.value, { stream: true });

          var lines = buf.split('\n');
          buf = lines.pop() || '';

          var eventType = '';
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (line.startsWith('event: ')) {
              eventType = line.slice(7);
            } else if (line.startsWith('data: ') && eventType) {
              try {
                var d = JSON.parse(line.slice(6));
                if (eventType === 'text') {
                  // 显示流式文本
                  if (!assistantWrapper) {
                    toolsWrapper.remove();
                    assistantWrapper = document.createElement('div');
                    assistantWrapper.className = 'msg-wrapper assistant';
                    assistantDiv = document.createElement('div');
                    assistantDiv.className = 'msg assistant';
                    assistantWrapper.appendChild(assistantDiv);
                    messagesEl.appendChild(assistantWrapper);
                  }
                  // 流式传输时使用纯文本（防止不完整的 Markdown 破坏 marked 渲染）
                  assistantDiv.textContent = d.fullText + ' \u258C';
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                } else if (eventType === 'tool') {
                  // 首次工具调用：清除“思考中...”文本
                  if (toolHistory.length === 0) {
                    toolsDiv.textContent = '';
                  }
                  toolHistory.push(d.toolName);
                  // 添加新的工具行（不覆盖之前的）
                  var toolLine = document.createElement('div');
                  toolLine.style.cssText = 'font-size:12px;color:#888;padding:1px 0;';
                  toolLine.textContent = '\u{1F527} ' + d.toolName + (d.inputSummary || '');
                  toolsDiv.appendChild(toolLine);
                  messagesEl.scrollTop = messagesEl.scrollHeight;
                } else if (eventType === 'done') {
                  // 完成：渲染最终文本
                  if (!assistantWrapper) {
                    assistantWrapper = document.createElement('div');
                    assistantWrapper.className = 'msg-wrapper assistant';
                    assistantDiv = document.createElement('div');
                    assistantDiv.className = 'msg assistant';
                    assistantDiv.style.whiteSpace = 'normal';
                    assistantWrapper.appendChild(assistantDiv);
                    messagesEl.appendChild(assistantWrapper);
                  }
                  if (toolsWrapper.parentElement) toolsWrapper.remove();
                  assistantDiv.style.whiteSpace = 'normal';
                  assistantDiv.innerHTML = renderMarkdown(d.response || '');
                  // 时间
                  var t = document.createElement('div');
                  t.className = 'msg-time';
                  t.textContent = formatTime(new Date().toISOString());
                  assistantWrapper.appendChild(t);
                  // usage
                  if (d.usage) {
                    var parts = [];
                    if (d.usage.num_turns != null) parts.push('\u{1F504} ' + d.usage.num_turns + ' 轮');
                    if (d.usage.duration_ms != null) parts.push('\u{23F1}\uFE0F ' + (d.usage.duration_ms/1000).toFixed(1) + '秒');
                    if (d.usage.total_cost_usd != null) parts.push('\u{1F4B0} $' + d.usage.total_cost_usd.toFixed(4));
                    if (parts.length > 0) {
                      var uel = document.createElement('div');
                      uel.className = 'msg-usage';
                      uel.innerHTML = parts.map(function(p){ return '<span>'+p+'</span>'; }).join('');
                      assistantWrapper.appendChild(uel);
                    }
                  }
                  if (d.sessionId) currentSessionId = d.sessionId;
                  loadSessions();
                } else if (eventType === 'error') {
                  toolsWrapper.remove();
                  addMessage(d.message || '错误', 'error');
                }
              } catch(e) {}
              eventType = '';
            }
          }
        }
      } catch(err) {
        if (toolsWrapper.parentElement) toolsWrapper.remove();
        if (assistantWrapper && assistantWrapper.parentElement) assistantWrapper.remove();
        addMessage(err.name === 'AbortError' ? '已停止' : '连接错误', 'error');
      } finally {
        setProcessing(false);
        abortController = null;
        inputEl.focus();
      }
    }

    function stopChat() { if (abortController) abortController.abort(); }

    async function newSession() {
      try {
        var res = await fetch('/api/sessions', { method: 'POST' });
        var data = await res.json();
        if (data.sessionId) currentSessionId = data.sessionId;
      } catch(e) {}
      messagesEl.innerHTML = '';
      sessionTitleEl.textContent = '';
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.placeholder = '消息...';
      loadSessions();
      closeSidebar();
      inputEl.focus();
    }

    async function resumeSession(id) {
      try {
        var res = await fetch('/api/sessions/' + encodeURIComponent(id) + '/resume', { method: 'POST' });
        var data = await res.json();
        if (data.ok) {
          currentSessionId = data.sessionId || id;
          inputEl.disabled = false;
          sendBtn.disabled = false;
          inputEl.placeholder = '消息...';
          // 移除恢复按钮
          var btns = messagesEl.querySelectorAll('button');
          btns.forEach(function(b){ b.remove(); });
          loadSessions();
          inputEl.focus();
        }
      } catch(e) {}
    }

    async function deleteSessionById(id) {
      if (!confirm('删除此会话？')) return;
      try {
        await fetch('/api/sessions/' + encodeURIComponent(id), { method: 'DELETE' });
        if (currentSessionId === id) {
          currentSessionId = null;
          messagesEl.innerHTML = '';
          sessionTitleEl.textContent = '';
          inputEl.disabled = true;
          sendBtn.disabled = true;
          inputEl.placeholder = '请选择会话或开始新聊天';
        }
        loadSessions();
      } catch(e) {}
    }

    async function editTitle() {
      if (!currentSessionId) return;
      var current = sessionTitleEl.textContent;
      var t = prompt('会话标题：', current);
      if (t && t !== current) {
        await fetch('/api/sessions/' + encodeURIComponent(currentSessionId), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: t }),
        });
        sessionTitleEl.textContent = t;
        loadSessions();
      }
    }

    // 忽略 IME 输入法转换中的 Enter 键
    function handleKey(e) {
      if (e.isComposing || e.keyCode === 229) return;
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    }

    inputEl.addEventListener('input', function() {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // 初始状态：输入框禁用，提示选择会话或新建聊天
    inputEl.disabled = true;
    sendBtn.disabled = true;
    inputEl.placeholder = '请选择会话或开始新聊天';
    messagesEl.innerHTML = '<div style="text-align:center;color:#666;padding:40px 20px;font-size:15px;">从侧边栏选择会话<br>或点击 <strong>+ 新建聊天</strong></div>';
    // 拖放
    document.body.addEventListener('dragover', function(e) { e.preventDefault(); });
    document.body.addEventListener('drop', function(e) {
      e.preventDefault();
      if (e.dataTransfer && e.dataTransfer.files.length > 0) {
        for (var f of e.dataTransfer.files) { addPendingFile(f); }
      }
    });

    loadSessions();
  </script>
</body>
</html>
